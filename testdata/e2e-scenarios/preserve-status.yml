name: preserve status
timeout: 10s

cases:
  - name: preserves command status after timeout
    args: ["--foreground", "--preserve-status", "0.1s", "sh", "-c", "trap 'exit 42' TERM; while true; do :; done"]
    stdin: ""
    want:
      exit_code: 42
      stdout:
        equals: ""
      stderr:
        equals: ""
