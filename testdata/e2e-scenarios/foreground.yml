name: foreground
timeout: 10s

cases:
  - name: signals direct command only
    args:
      - "--foreground"
      - "0.1s"
      - "sh"
      - "-c"
      - >-
        child=; cleanup() { printf '%s\n' parent-term; if [ -n "$child" ]; then kill -KILL "$child" 2>/dev/null; wait "$child" 2>/dev/null; fi; exit 0; }; trap cleanup TERM; (trap 'printf "%s\n" child-term; exit 0' TERM; while :; do sleep 1; done) & child=$!; wait "$child"
    stdin: ""
    want:
      exit_code: 124
      stdout:
        equals: "parent-term\n"
      stderr:
        equals: ""
