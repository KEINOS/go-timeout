version: "2"
run:
  tests: true
  allow-parallel-runners: true

linters:
  default: all
  disable:
    # Deprecated linters
    - wsl
    - gomodguard
    # Disabled by project policy
    - depguard
    - testpackage
    - gochecknoglobals
    # Too noisy for CLI parser tables and tests in this project.
    - cyclop
    - goconst
    - mnd
  settings:
    paralleltest:
      ignore-missing: false
    varnamelen:
      ignore-names:
        - ok
        - t
        - tt
